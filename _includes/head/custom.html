<!-- Mermaid.js support for Markdown diagrams -->
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    mermaid.initialize({ startOnLoad: true, theme: 'dark' });

    // Find all pre > code.language-mermaid elements and replace them with mermaid divs
    const mermaidBlocks = document.querySelectorAll('pre > code.language-mermaid');
    mermaidBlocks.forEach(function(block) {
      const parentPre = block.parentNode;
      const newDiv = document.createElement('div');
      newDiv.className = 'mermaid';
      newDiv.textContent = block.textContent;
      parentPre.parentNode.replaceChild(newDiv, parentPre);
    });

    // Initialize again after DOM manipulation
    mermaid.init(undefined, document.querySelectorAll('.mermaid'));
  });
</script>
